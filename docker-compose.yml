services:
  postgres:
    image: postgres:17

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend

    env_file:
      - .env

    ports:
      - "8001:8000"

    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend

    ports:
      - "3000:3000"

    depends_on:
      - backend

volumes:
  postgres_data: